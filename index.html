<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Grave Reaper</title>
  <link rel="stylesheet" href="css/style.css?v=18">
  <!-- Base44 SDK（ゲーセン化：オンラインランキング）。読込失敗時はバニラモードで動作。
       公式パッケージ @base44/sdk を ESM CDN(esm.sh) から読み込む。 -->
  <script type="module">
    try {
      const { createClient } = await import('https://esm.sh/@base44/sdk');
      window.base44 = createClient({ appId: '6a2d01f339fbcea2e6958c2d' });
      window.dispatchEvent(new Event('base44ready'));
      console.info('Base44 SDK ready');
    } catch (e) {
      console.warn('Base44 SDK 未読込のためバニラモードで動作します:', e);
    }
  </script>
</head>
<body>
  <div id="game-container">
    <!-- Pixel-art world (low-res, nearest-neighbour upscaling) -->
    <canvas id="game-canvas" width="480" height="270"></canvas>
    <!-- Crisp UI overlay (high-res, smooth text) -->
    <canvas id="ui-canvas"></canvas>
  </div>
  <!-- 全画面表示トグル（Fキーでも切替可） -->
  <button id="fs-btn" type="button" title="全画面表示 (F)" aria-label="全画面表示">⛶</button>

  <!-- ゲーセン化：ログイン/ランキング操作バー（タイトル画面でのみ表示） -->
  <div id="arcade-bar" hidden>
    <span id="arcade-user"></span>
    <button id="arcade-login" type="button">🎮 ゲーセンに入る</button>
    <button id="rank-btn" type="button" hidden>🏆 ランキング</button>
    <button id="logout-btn" type="button" hidden>ログアウト</button>
  </div>

  <script type="module" src="src/main.js?v=18"></script>
</body>
</html>
